name: Validate Sources

on:
  push:
    branches: [main]
    paths:
      - 'web-scraper/SOURCES/**/*.yaml'
      - 'web-scraper/SOURCES/**/*.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web-scraper/SOURCES/**/*.yaml'
      - 'web-scraper/SOURCES/**/*.yml'

jobs:
  validate:
    name: SOURCES Schema Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-scraper/package-lock.json
      - run: npm ci
      - run: npx vitest run src/utils/validate-sources.test.ts
