name: Lint

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/Dockerfile"
      - "**/*.dev"
      - "**/*.ignore"
      - "**/*.md"
      - "**/*.json"
      - "**/*.lock"
  # pull_request:
  #   branches: [main]
  #   paths-ignore:
  #     - '**.md'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rag-pipeline: ${{ steps.filter.outputs.rag-pipeline }}
      retrieval-api: ${{ steps.filter.outputs.retrieval-api }}
      advisor-ui: ${{ steps.filter.outputs.advisor-ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rag-pipeline:
              - 'rag-pipeline/**'
            retrieval-api:
              - 'retrieval-api/**'
            advisor-ui:
              - 'advisor-ui/**'

  advisor-ui:
    name: Advisor UI (ESLint)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.advisor-ui == 'true'
    defaults:
      run:
        working-directory: advisor-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: advisor-ui/package-lock.json
      - run: npm ci
      - run: npm run lint

  retrieval-api:
    name: Retrieval API (Ruff)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.retrieval-api == 'true'
    defaults:
      run:
        working-directory: retrieval-api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  rag-pipeline:
    name: RAG Pipeline (Ruff)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rag-pipeline == 'true'
    defaults:
      run:
        working-directory: rag-pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
