group_title: Getting Started Docs
description: |
  Use these docs as basis for foundational knowledge. This type of information should apply to nearly every AKS user and cluster.
workloads:
  - all
scenarios:
  - all
urls:
  - url: "https://learn.microsoft.com/en-us/azure/aks/core-aks-concepts"
    doc_type: overview
    priority: 15
    comments: good overview of what a AKS/Kubernetes cluster is and its overall components, e.g. control plane (azure managed) vs data plane, i.e. nodes, namespaces, etc.

  # VM Sizes
  - url: "https://learn.microsoft.com/en-us/azure/virtual-machines/sizes/overview"
    doc_type: overview
    priority: 20
    comments: |
      VM size families, naming conventions, and selection guidance. Key for node pool SKU decisions.

  - url: "https://learn.microsoft.com/en-us/azure/virtual-machines/vm-naming-conventions"
    doc_type: reference
    priority: 20
    comments: |
      Explains the VM SKU naming format (family, vCPUs, feature flags, generation).

  # Resource management
  - url: "https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/"
    doc_type: reference
    priority: 15
    comments: |
      Kubernetes upstream doc on pod resource requests, limits, CPU/memory units, and scheduling behavior.

  - url: "https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources/"
    doc_type: reference
    priority: 15
    comments: |
      Explains kube-reserved, system-reserved, eviction thresholds, and how allocatable capacity is calculated.

  # Identity
  - url: "https://learn.microsoft.com/en-us/azure/aks/concepts-identity"
    doc_type: overview
    priority: 20
    comments: |
      Good list of Kubernetes concepts, mapping to Azure and and diagrams.

  # Security
  - url: "https://learn.microsoft.com/en-us/azure/aks/concepts-security"
    doc_type: overview
    priority: 10
    comments: |
      Good list of security topics, incl. build, container, cluster, node, network, application, secrets. Not many links. Use for framing, but not as source.

  # Backup and Recovery
  - url: https://learn.microsoft.com/en-us/azure/backup/azure-kubernetes-service-backup-overview
    doc_type: overview
    priority: 10
    comments: |
      Overview of priorietary AKS Backup solution.

  # Pre-reqs for backup
  - url: https://learn.microsoft.com/en-us/azure/backup/azure-kubernetes-service-cluster-backup-concept
    doc_type: overview
    priority: 15
    comments: |
      Has tables for required roles, permissions, etc. for backup extension. Good source.

  # AKS Automatic
  - url: https://learn.microsoft.com/en-us/azure/aks/intro-aks-automatic
    doc_type: reference
    priority: 15
    comments: |
      Overview of AKS automatic, with many comparison tables of AKS automatic pre-configurations vs AKS standard optional configurations.

  # Integrations, Addons, etc.
  - url: https://learn.microsoft.com/en-us/azure/aks/integrations
    doc_type: reference
    priority: 10
    comments: |
      Lists and Tables of various addons, incl. monitoring, azure policy.

  # --- wave 2 ---

  - url: https://learn.microsoft.com/en-us/azure/aks/managed-identity-overview
    title: Use a managed identity in Azure Kubernetes Service (AKS)
    description: Learn how to use managed identities in Azure Kubernetes Service (AKS).
    priority: 8
    wave: 2

  - url: https://learn.microsoft.com/en-us/azure/aks/operator-best-practices-identity
    title: Best practices for authentication and authorization - Azure Kubernetes Service
    description: Learn the cluster operator best practices for managing authentication and authorization for clusters in Azure Kubernetes Service (AKS).
    priority: 8
    wave: 2

  - url: https://learn.microsoft.com/en-us/azure/aks/workload-identity-overview
    title: Microsoft Entra Workload ID with Azure Kubernetes Service (AKS)
    description: Learn about Microsoft Entra Workload ID for Azure Kubernetes Service (AKS) and how to migrate your application to use it.
    priority: 8
    wave: 2
