# =============================================================================
# AKS Documentation Sources
# =============================================================================
# Each source defines:
#   - name:          Unique identifier for this source group
#   - description:   Human-readable description
#   - seed_urls:     Starting URLs to crawl
#   - allowed_globs: URL patterns the crawler may follow from these pages
#   - priority:      Weight for retrieval boosting (higher = more important).
#                    Scale is non-linear — use whatever numbers feel right.
#                    Inherited by all pages from this source.
#   - tags:          Metadata attached to every page from this source
#                    (used later for filtering/weighting in the RAG pipeline)
#
# Per-page overrides (not yet implemented):
#   page_overrides:
#     - url: https://learn.microsoft.com/.../some-specific-page
#       priority: 50
#       tags: { extra_tag: value }
#
# To add a new source: copy an existing block and adjust the fields.
# Re-run `npm run crawl` — already-crawled pages are skipped automatically.
# =============================================================================

sources:
  # ----------------------
  # Core AKS Documentation
  # ----------------------
  # - name: aks-docs
  #   description: Official AKS documentation
  #   seed_urls:
  #     - https://learn.microsoft.com/en-us/azure/aks/
  #   allowed_globs:
  #     - "https://learn.microsoft.com/en-us/azure/aks/**"
  #   priority: 20
  #   tags:
  #     source_category: aks-docs

  # --------------------------
  # Well-Architected Framework
  # --------------------------
  - name: waf-aks
    description: Well-Architected Framework - AKS service guide
    seed_urls:
      - https://learn.microsoft.com/en-us/azure/well-architected/service-guides/azure-kubernetes-service
    allowed_globs:
      - "https://learn.microsoft.com/en-us/azure/well-architected/service-guides/azure-kubernetes-service**"
    priority: 20
    tags:
      source_category: waf
      waf_pillar: multi

  # -------------------------
  # Azure Architecture Center
  # -------------------------
  - name: aac-reference-architectures
    description: Azure Architecture Center - AKS reference architectures
    seed_urls:
      - https://learn.microsoft.com/en-us/azure/architecture/reference-architectures/containers/aks/baseline-aks
      - https://learn.microsoft.com/en-us/azure/architecture/reference-architectures/containers/aks-microservices/aks-microservices-advanced
      - https://learn.microsoft.com/en-us/azure/architecture/reference-architectures/containers/aks-multi-region/aks-multi-cluster
    allowed_globs:
      - "https://learn.microsoft.com/en-us/azure/architecture/reference-architectures/containers/aks**"
    priority: 10
    tags:
      source_category: aac
      doc_type: reference-architecture

  # -------------------------------------------
  # Cloud Adoption Framework — AKS Landing Zone
  # -------------------------------------------
  - name: caf-landing-zone
    description: Cloud Adoption Framework - AKS Landing Zone Accelerator
    seed_urls:
      - https://learn.microsoft.com/en-us/azure/cloud-adoption-framework/scenarios/app-platform/aks/landing-zone-accelerator
    allowed_globs:
      - "https://learn.microsoft.com/en-us/azure/cloud-adoption-framework/scenarios/app-platform/aks/**"
    priority: 20
    tags:
      source_category: caf
      doc_type: landing-zone

  # -------------------
  # Regulated Scenarios
  # -------------------
  - name: aks-pci-regulated
    description: AKS regulated cluster for PCI DSS
    seed_urls:
      - https://learn.microsoft.com/en-us/azure/aks/pci-intro
    allowed_globs:
      - "https://learn.microsoft.com/en-us/azure/aks/pci-**"
    priority: 10
    tags:
      source_category: aks-docs
      scenario_tags: [regulated, pci-dss]
      waf_pillar: security
