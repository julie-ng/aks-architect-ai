services:
  qdrant:
    image: qdrant/qdrant:v1 # use v1-unprivileged in deployments
    ports:
      - "6333:6333" # REST API + dashboard UI
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  advisor-api:
    build: advisor-api
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_HOST: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
