services:
  qdrant:
    image: qdrant/qdrant:v1 # use v1-unprivileged in deployments
    ports:
      - "6333:6333" # REST API + dashboard UI
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  advisor-api:
    build: advisor-api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    volumes:
      - ./advisor-api/app:/workspace/app
      - ./system-prompt.txt:/workspace/system-prompt.txt
    environment:
      APP_ENVIRONMENT: development
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: aks-docs
      EMBEDDING_MODEL: nomic-embed-text
      CHAT_MODEL: llama3.2
      CORS_ORIGINS: '["http://localhost:3000"]'
      RETRIEVAL_TOP_K: 5
      PRIORITY_BOOST_WEIGHT: 0.1
      SYSTEM_PROMPT_PATH: system-prompt.txt
      OLLAMA_HOST: http://host.docker.internal:11434
      OPENAPI_DOCS_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  advisor-ui:
    build:
      context: advisor-ui
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "24678:24678" # Nuxt HMR websocket
    depends_on:
      - advisor-api
    volumes:
      - ./advisor-ui:/workspace
      - advisor_ui_node_modules:/workspace/node_modules
      - ./system-prompt.txt:/system-prompt.txt:ro
    environment:
      NUXT_ADVISOR_API_URL: http://advisor-api:8000
      NUXT_OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
  advisor_ui_node_modules:
