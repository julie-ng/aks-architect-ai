services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  retrieval-api:
    build: retrieval-api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./retrieval-api/app:/workspace/app
    environment:
      APP_ENVIRONMENT: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      CHAT_MODEL: ${CHAT_MODEL}
      REFORMULATION_MODEL: ${REFORMULATION_MODEL}
      CORS_ORIGINS: '["http://localhost:3000"]'
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K}
      PRIORITY_BOOST_WEIGHT: ${PRIORITY_BOOST_WEIGHT}
      OLLAMA_HOST: http://host.docker.internal:11434
      REFORMULATION_TEMPERATURE: ${REFORMULATION_TEMPERATURE}
      OPENAPI_DOCS_ENABLED: ${OPENAPI_DOCS_ENABLED}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  advisor-ui:
    build:
      context: advisor-ui
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "24678:24678" # Nuxt HMR websocket
    depends_on:
      - retrieval-api
      - postgres
    volumes:
      - ./advisor-ui:/workspace
      - advisor_ui_node_modules:/workspace/node_modules
    environment:
      NUXT_APP_ENVIRONMENT: development
      NUXT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NUXT_RETRIEVAL_API_HOST: http://retrieval-api:8000
      NUXT_AI_PROVIDER: ${AI_PROVIDER}
      NUXT_AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY}
      NUXT_AI_CHAT_MODEL: ${CHAT_MODEL}
      NUXT_AI_LLM_XS_MODEL: ${LLM_XS_MODEL}
      NUXT_AI_CHAT_TEMPERATURE: ${CHAT_TEMPERATURE}
      NUXT_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
      NUXT_OAUTH_GITHUB_CLIENT_ID: ${NUXT_OAUTH_GITHUB_CLIENT_ID}
      NUXT_OAUTH_GITHUB_CLIENT_SECRET: ${NUXT_OAUTH_GITHUB_CLIENT_SECRET}
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  advisor_ui_node_modules:
