services:
  qdrant:
    image: qdrant/qdrant:v1 # use v1-unprivileged in deployments
    ports:
      - "6333:6333" # REST API + dashboard UI
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  advisor-api:
    build: advisor-api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    volumes:
      - ./advisor-api/app:/workspace/app
      - ./system-prompt.md:/workspace/system-prompt.md
    environment:
      APP_ENVIRONMENT: development
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      CHAT_MODEL: ${CHAT_MODEL}
      CORS_ORIGINS: '["http://localhost:3000"]'
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K}
      PRIORITY_BOOST_WEIGHT: ${PRIORITY_BOOST_WEIGHT}
      SYSTEM_PROMPT_PATH: ${SYSTEM_PROMPT_PATH}
      OLLAMA_HOST: ${OLLAMA_HOST}
      OPENAPI_DOCS_ENABLED: ${OPENAPI_DOCS_ENABLED}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  advisor-ui:
    build:
      context: advisor-ui
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "24678:24678" # Nuxt HMR websocket
    depends_on:
      - advisor-api
    volumes:
      - ./advisor-ui:/workspace
      - advisor_ui_node_modules:/workspace/node_modules
      - ./system-prompt.md:/system-prompt.md:ro
    environment:
      NUXT_APP_ENVIRONMENT: development
      NUXT_ADVISOR_API_HOST: http://advisor-api:8000
      NUXT_OLLAMA_HOST: ${OLLAMA_HOST}
      NUXT_CHAT_MODEL: ${CHAT_MODEL}
      NUXT_SYSTEM_PROMPT_PATH: /system-prompt.md
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
  advisor_ui_node_modules:
